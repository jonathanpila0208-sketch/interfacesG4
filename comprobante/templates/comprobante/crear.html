{% load static %}
{% include 'private/header.html' %}

<div class="container-fluid px-4">
    <h1 class="mt-4">Nuevo Comprobante</h1>
    <div class="card mb-4">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Número de Comprobante</label>
                    <input type="text" name="numero_comprobante" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Fecha</label>
                    <input type="date" name="fecha" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Cliente</label>
                    <input type="text" name="cliente" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea name="descripcion" class="form-control" required></textarea>
                </div>
                <div class="mb-3">
                    <label>Total</label>
                    <input type="number" name="total" step="0.01" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'lista_comprobantes' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

{% include 'private/footer.html' %}
