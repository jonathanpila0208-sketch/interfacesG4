{% load static %}
{% include 'private/header.html' %}

<div class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Editar Orden {{ orden.numero_orden }}</h1>
        <a href="{% url 'orden_trabajo' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">ALINEACIÓN TOTAL — Editar Orden de Trabajo</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'editar_orden' orden.id %}">
                {% csrf_token %}

                <div class="row border-bottom pb-2 mb-3">
                    <div class="col-md-4">
                        <label>Orden de Trabajo N°:</label>
                        <input type="text" class="form-control" name="numero_orden" value="{{ orden.numero_orden }}" required>
                    </div>
                    <div class="col-md-4">
                        <label>Nombre:</label>
                        <input type="text" class="form-control" name="nombre" value="{{ orden.nombre }}" required>
                    </div>
                    <div class="col-md-4">
                        <label>Estado:</label>
                        <select class="form-control" name="estado">
                            <option value="pendiente" {% if orden.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                            <option value="en_proceso" {% if orden.estado == 'en_proceso' %}selected{% endif %}>En Proceso</option>
                            <option value="completado" {% if orden.estado == 'completado' %}selected{% endif %}>Completado</option>
                            <option value="cancelado" {% if orden.estado == 'cancelado' %}selected{% endif %}>Cancelado</option>
                        </select>
                    </div>
                </div>

                <div class="row border-bottom pb-2 mb-3">
                    <div class="col-md-3">
                        <label>Fecha:</label>
                        <input type="date" class="form-control" name="fecha" value="{{ orden.fecha }}">
                    </div>
                    <div class="col-md-3">
                        <label>Tipo Vehículo:</label>
                        <select class="form-control" name="tipo_vehiculo">
                            <option value="automovil" {% if orden.tipo_vehiculo == 'automovil' %}selected{% endif %}>Automóvil</option>
                            <option value="camioneta" {% if orden.tipo_vehiculo == 'camioneta' %}selected{% endif %}>Camioneta</option>
                            <option value="suv" {% if orden.tipo_vehiculo == 'suv' %}selected{% endif %}>SUV</option>
                            <option value="furgoneta" {% if orden.tipo_vehiculo == 'furgoneta' %}selected{% endif %}>Furgoneta</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Marca:</label>
                        <input type="text" class="form-control" name="marca" value="{{ orden.marca }}">
                    </div>
                    <div class="col-md-3">
                        <label>Placas:</label>
                        <input type="text" class="form-control" name="placas" value="{{ orden.placas }}">
                    </div>
                </div>

                <div class="row border-bottom pb-2 mb-3">
                    <div class="col-md-4">
                        <label>Teléfono:</label>
                        <input type="text" class="form-control" name="telefono" value="{{ orden.telefono }}">
                    </div>
                    <div class="col-md-4">
                        <label>Total:</label>
                        <input type="number" class="form-control" name="total" value="{{ orden.total }}" step="0.01">
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label>Otros:</label>
                    <textarea class="form-control" name="otros" rows="3">{{ orden.otros }}</textarea>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a href="{% url 'orden_trabajo' %}" class="btn btn-danger">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% include 'private/footer.html' %}
