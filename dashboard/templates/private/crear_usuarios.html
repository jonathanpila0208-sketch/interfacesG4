{% load static %}
{% include "private/header.html %}
<form action="" method="post">
    {% csrf_token %}
    <!--Filas aqui-->
    <div class="form-group">
        <label for="username"> Nombre del usuario</label>
        <input type="text" name="username" class="form-group" required>
    </div>
    <div class="form-group">
        <label for="email"> Correo electrónico </label>
        <input type="text" name="email" class="form-group" required>
    </div>
    <div class="form-group">
        <label for="password"> Password: </label>
        <input type="password" name="password" class="form-group" required>
    </div>
    <button class="btn btn-success"> GUARDAR </button>
    <a href="{% url 'listar_usuarios' %}" class="btn btn-danger"> CANCELAR </a>
</form>
{% include "private/footer.html %}
